spring:
  config:
    activate:
      on-profile: mongodb

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/shield}
      auto-index-creation: true

  # Disable SQL dependencies when using NoSQL
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  h2:
    console:
      enabled: false
